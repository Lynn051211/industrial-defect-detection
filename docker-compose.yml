version: "3.8"

services:
  defect-detector:
    build: .
    image: defect-detector:latest
    container_name: defect-detector
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - MODEL_PATH=models/defect_detector.onnx
      - CONFIDENCE_THRESHOLD=0.35
      - IOU_THRESHOLD=0.45
    volumes:
      - ./models:/app/models:ro
      - ./data/uploads:/app/data/uploads
      - ./logs:/app/logs
      - ./output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
