name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}

      - name: Install system deps
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libsm6 libxext6

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Verify model
        run: |
          ls -lh models/defect_detector.onnx
          python -c "import onnx; onnx.checker.check_model(onnx.load('models/defect_detector.onnx')); print('ONNX OK')"

      - name: Run tests
        run: pytest tests/ -v --tb=short --timeout=120

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t defect-detector .
      - name: Verify container
        run: |
          docker run --rm -d --name test-dd defect-detector
          sleep 15
          docker logs test-dd --tail 10
          docker stop test-dd
